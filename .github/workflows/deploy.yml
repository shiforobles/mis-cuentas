name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (no npm ci): tolera el drift de deps opcionales
      # multiplataforma (@emnapi/* del fallback WASM de rollup).
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          # Credenciales de Supabase (cargar como Secrets del repo en
          # Settings → Secrets and variables → Actions). Si no están definidos,
          # el build sale en modo "sin sync" y la app funciona igual offline.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
